		/* JOURNEY QUOTE STYLES */
		.vjs-journey-quote-section {
			background: #f4f7f6;
			padding: 120px 0;
			position: relative;
			overflow: hidden;
		}

		.vjs-quote-box {
			max-width: 900px;
			margin: 0 auto;
			padding: 0 40px;
			position: relative;
		}

		.vjs-quote-box p {
			font-size: clamp(24px, 4vw, 36px);
			line-height: 1.4;
			font-weight: 500;
			color: #19352d;
			letter-spacing: -0.5px;
			margin: 0;
			position: relative;
			z-index: 2;
		}

		.vjs-quote-box::before {
			content: "“";
			position: absolute;
			top: -40px;
			left: -20px;
			font-size: 150px;
			font-family: serif;
			opacity: 0.08;
			color: #19352d;
			line-height: 1;
		}

		.vjs-quote-box::after {
			content: "";
			position: absolute;
			right: 0;
			bottom: -20px;
			width: 150px;
			height: 80px;
			border-right: 4px solid #19352d;
			border-bottom: 4px solid #19352d;
			opacity: 0.15;
		}

		/* JOURNEY TIMELINE STYLES */
		.vjs-timeline-section {
			background: #daece6;
			padding: 120px 0;
			position: relative;
			overflow: hidden;
		}

		.vjs-timeline-container {
			position: relative;
			max-width: 1000px;
			margin: 0 auto;
			padding: 50px 0;
		}

		/* Central Line */
		.vjs-timeline-container::after {
			content: "";
			position: absolute;
			width: 2px;
			background: linear-gradient(to bottom, transparent, #1ca161 10%, #1ca161 90%, transparent);
			top: 0;
			bottom: 0;
			left: 50%;
			margin-left: -1px;
			opacity: 0.2;
		}

		.vjs-milestone {
			padding: 10px 40px;
			position: relative;
			width: 50%;
			z-index: 1;
		}

		/* Marker Circles */
		.vjs-milestone::after {
			content: "";
			position: absolute;
			width: 16px;
			height: 16px;
			right: -8px;
			background-color: #d5fcbc;
			border: 4px solid #1ca161;
			top: 40px;
			border-radius: 50%;
			z-index: 1;
			box-shadow: 0 0 0 4px rgba(28, 161, 97, 0.1);
		}

		.vjs-milestone.right {
			left: 50%;
		}

		.vjs-milestone.right::after {
			left: -8px;
		}

		.vjs-milestone-content {
			padding: 35px;
			background-color: #ffffff;
			border-radius: 20px;
			position: relative;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
			border: 1px solid rgba(25, 53, 45, 0.04);
			transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
		}

		.vjs-milestone-content:hover {
			transform: translateY(-8px) scale(1.02);
			box-shadow: 0 25px 60px rgba(28, 161, 97, 0.12);
			border-color: rgba(28, 161, 97, 0.25);
		}

		.vjs-year {
			font-size: 20px;
			font-weight: 800;
			margin-bottom: 12px;
			display: block;
			letter-spacing: 1px;
		}

		.text-gradient-one {
			background: linear-gradient(90deg, #1ca161 0%, #dfff7c 100%);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.vjs-milestone-content h4 {
			font-size: 24px;
			font-weight: 700;
			color: #19352d;
			margin-bottom: 15px;
		}

		.vjs-milestone-content p {
			margin: 0;
			color: #5d706a;
			line-height: 1.6;
		}

		@media (max-width: 767px) {
			.vjs-timeline-container::after {
				left: 31px;
			}

			.vjs-milestone {

		/* FLOATING BUBBLES BG */
		.vjs-bubble-wrap {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 0;
			overflow: hidden;
			pointer-events: none;
		}

		.vjs-bubble {
			position: absolute;
			bottom: -150px;
			background: rgba(28, 161, 97, 0.06);
			border-radius: 50%;
			animation: flowUp 15s infinite linear;
				opacity: 0;
			}
		}

		.vjs-bubble:nth-child(1) {
			width: 80px;
			height: 80px;
			left: 10%;
			animation-duration: 20s;
			animation-delay: 2s;
		}

		.vjs-bubble:nth-child(2) {
			width: 120px;
			height: 120px;
			left: 25%;
			animation-duration: 15s;
			animation-delay: 0s;
		}

		.vjs-bubble:nth-child(3) {
			width: 50px;
			height: 50px;
			left: 45%;
			animation-duration: 18s;
			animation-delay: 5s;
		}

		.vjs-bubble:nth-child(4) {
			width: 100px;
			height: 100px;
			left: 70%;
			animation-duration: 22s;
			animation-delay: 1s;
		}

		.vjs-bubble:nth-child(5) {
			width: 60px;
			height: 60px;
			left: 85%;
			animation-duration: 16s;
			animation-delay: 8s;
		}

		.vjs-bubble:nth-child(6) {
			width: 90px;
			height: 90px;
			left: 15%;
			animation-duration: 25s;
			animation-delay: 4s;
		}

		.vjs-milestone-content.active .vjs-click-hint {

			margin: 0;
